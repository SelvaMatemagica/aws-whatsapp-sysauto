name: Deploy aws-whatsapp-sysauto

on:
  push:
    paths:
      - aws-whatsapp-sysauto/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # ✅ necesario para OIDC
      contents: read    # para poder hacer checkout del repo

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v3

      - name: 📦 Empaquetar aws-whatsapp-sysauto.zip
        run: |
          cd aws-whatsapp-sysauto
          zip -r ../aws-whatsapp-sysauto.zip .

      - name: 🔐 Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::376572378022:role/Github_link_whatsapp
          aws-region: us-east-2

      - name: 🔍 Validar existencia del zip
        run: |
          if [ ! -f aws-whatsapp-sysauto.zip ]; then 
            echo "❌ Zip no encontrado"
            exit 1
          fi

      - name: 🚀 Subir a Lambda
        run: |
          set -euo pipefail
          trap 'echo "⚠️ Error en línea $LINENO"; exit 1' ERR

          echo "📤 Desplegando función aws-whatsapp-sysauto..."
          aws lambda update-function-code \
            --function-name aws-whatsapp-sysauto \
            --zip-file fileb://aws-whatsapp-sysauto.zip \
            --region us-east-2

      - name: 📝 Registrar despliegue
        run: echo "✅ Desplegado por ${{ github.actor }} con commit ${{ github.sha }}"